name: CDD Shared CMake CI

on:
  workflow_call:
    inputs:
      build_type:
        description: 'Default CMake build type (Release, Debug, RelWithDebInfo, MinSizeRel)'
        default: 'Debug'
        type: string
      cmake_configure_flags:
        description: 'Additional CMake configuration flags (e.g. -DBUILD_TESTING=ON)'
        default: ''
        type: string
      cmake_build_flags:
        description: 'Additional CMake build flags'
        default: ''
        type: string
      project_name:
        description: 'Project name for auto test flag. Defaults to repository name.'
        default: ''
        type: string
      auto_test_flag:
        description: 'Automatically add -D<PROJECT_NAME>_TESTING=ON (derived from project_name or repo name)'
        default: true
        type: boolean

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ==========================================
          # WINDOWS - MSVC Latest (2026 / 2022)
          # ==========================================
          - name: Win MSVC Latest | Shared Lib (MD) | Unicode | LTO OFF | Multi-thread | FetchContent
            os: windows-latest
            compiler: msvc
            msvc_version: latest
            crt: MultiThreadedDLL
            charset: UNICODE
            shared: "ON"
            lto: "OFF"
            thread: "ON"
            deps: FETCHCONTENT
            rtc: "OFF"

          - name: Win MSVC Latest | Static Lib (MT) | ANSI | LTO ON | Single-thread | Vcpkg | RTC1
            os: windows-latest
            compiler: msvc
            msvc_version: latest
            crt: MultiThreaded
            charset: ANSI
            shared: "OFF"
            lto: "ON"
            thread: "OFF"
            deps: VCPKG
            rtc: "RTC1"

          - name: Win MSVC Latest | Static Lib (MDd) | Unicode | LTO OFF | Multi-thread | System | RTCu
            os: windows-latest
            compiler: msvc
            msvc_version: latest
            crt: MultiThreadedDebugDLL
            charset: UNICODE
            shared: "OFF"
            lto: "OFF"
            thread: "ON"
            deps: SYSTEM
            rtc: "RTCu"

          - name: Win MSVC 2022 | Shared Lib (MTd) | ANSI | LTO OFF | Single-thread | FetchContent | RTCs
            os: windows-2022
            compiler: msvc
            msvc_version: "2022"
            crt: MultiThreadedDebug
            charset: ANSI
            shared: "ON"
            lto: "OFF"
            thread: "OFF"
            deps: FETCHCONTENT
            rtc: "RTCs"

          # ==========================================
          # WINDOWS - MSVC 2005 (Legacy / Self-Hosted)
          # ==========================================
          # COMMENTED OUT: Awaiting self-hosted runner availability
          # - name: Win MSVC 2005 | Static Lib (MTd) | ANSI | LTO OFF | Multi-thread | System | RTCs
          #   os: [self-hosted, msvc2005]
          #   compiler: msvc
          #   msvc_version: 2005
          #   crt: MultiThreadedDebug
          #   charset: ANSI
          #   shared: "OFF"
          #   lto: "OFF"
          #   thread: "ON"
          #   deps: SYSTEM
          #   rtc: "RTCs"
          #   experimental: true

          # ==========================================
          # WINDOWS - MinGW & Cygwin
          # ==========================================
          - name: Win MinGW | Shared Lib | ANSI | Multi-thread | LTO OFF | System
            os: windows-latest
            compiler: mingw
            crt: ""
            charset: ANSI
            shared: "ON"
            lto: "OFF"
            thread: "ON"
            deps: SYSTEM
            rtc: "OFF"

          - name: Win MinGW | Static Lib | Unicode | Single-thread | LTO ON | FetchContent
            os: windows-latest
            compiler: mingw
            crt: ""
            charset: UNICODE
            shared: "OFF"
            lto: "ON"
            thread: "OFF"
            deps: FETCHCONTENT
            rtc: "OFF"

          - name: Win Cygwin | Static Lib | Unicode | Single-thread | LTO OFF | FetchContent
            os: windows-latest
            compiler: cygwin
            crt: ""
            charset: UNICODE
            shared: "OFF"
            lto: "OFF"
            thread: "OFF"
            deps: FETCHCONTENT
            rtc: "OFF"

          # ==========================================
          # LINUX - GCC & Clang
          # ==========================================
          - name: Linux GCC | Shared Lib | Unicode | Multi-thread | LTO OFF | Vcpkg
            os: ubuntu-latest
            compiler: gcc
            crt: ""
            charset: UNICODE
            shared: "ON"
            lto: "OFF"
            thread: "ON"
            deps: VCPKG
            rtc: "OFF"

          - name: Linux GCC | Static Lib | ANSI | Single-thread | LTO ON | FetchContent
            os: ubuntu-latest
            compiler: gcc
            crt: ""
            charset: ANSI
            shared: "OFF"
            lto: "ON"
            thread: "OFF"
            deps: FETCHCONTENT
            rtc: "OFF"

          - name: Linux Clang | Static Lib | ANSI | Single-thread | LTO ON | System
            os: ubuntu-latest
            compiler: clang
            crt: ""
            charset: ANSI
            shared: "OFF"
            lto: "ON"
            thread: "OFF"
            deps: SYSTEM
            rtc: "OFF"

          - name: Linux Clang | Shared Lib | Unicode | Multi-thread | LTO OFF | Vcpkg
            os: ubuntu-latest
            compiler: clang
            crt: ""
            charset: UNICODE
            shared: "ON"
            lto: "OFF"
            thread: "ON"
            deps: VCPKG
            rtc: "OFF"

          # ==========================================
          # MACOS - Apple Clang
          # ==========================================
          - name: macOS Clang | Shared Lib | Unicode | Multi-thread | LTO ON | FetchContent
            os: macos-latest
            compiler: clang
            crt: ""
            charset: UNICODE
            shared: "ON"
            lto: "ON"
            thread: "ON"
            deps: FETCHCONTENT
            rtc: "OFF"

          - name: macOS Clang | Static Lib | ANSI | Single-thread | LTO OFF | System
            os: macos-latest
            compiler: clang
            crt: ""
            charset: ANSI
            shared: "OFF"
            lto: "OFF"
            thread: "OFF"
            deps: SYSTEM
            rtc: "OFF"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Cache vcpkg
        id: cache-vcpkg
        if: matrix.deps == 'VCPKG'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg
          key: ${{ runner.os }}-vcpkg-project0

      - name: checkout vcpkg
        if: matrix.deps == 'VCPKG' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          repository: "offscale/vcpkg"
          ref: project0
          path: vcpkg

      - name: Bootstrap vcpkg
        if: matrix.deps == 'VCPKG' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./vcpkg/bootstrap-vcpkg.bat
          else
            ./vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Set vcpkg environment variables
        if: matrix.deps == 'VCPKG'
        shell: bash
        run: |
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> "$GITHUB_ENV"
          echo "VCPKG_INSTALLATION_ROOT=${{ github.workspace }}/vcpkg" >> "$GITHUB_ENV"

      - name: Setup Cygwin
        if: matrix.compiler == 'cygwin'
        uses: cygwin/cygwin-install-action@v6
        with:
          packages: |
            cmake
            gcc-core
            gcc-g++
            make
            dos2unix

      - name: Configure Cygwin bash to ignore CR
        if: matrix.compiler == 'cygwin'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "SHELLOPTS=igncr"

      - name: Install Line Ending Tools (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y dos2unix libsqlite3-dev
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install dos2unix sqlite
          fi

      - name: Convert Line Endings
        shell: bash
        run: |
          if [ "${{ matrix.compiler }}" = "msvc" ]; then
            echo "Converting line endings to CRLF for MSVC..."
            find . -type f \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' -o -name '*.cmake' -o -name 'CMakeLists.txt' \) -exec unix2dos {} + || true
          else
            echo "Converting line endings to LF for non-MSVC..."
            if command -v dos2unix &> /dev/null; then
              find . -type f \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' -o -name '*.cmake' -o -name 'CMakeLists.txt' \) -exec dos2unix {} + || true
            else
              echo "dos2unix not found, skipping..."
            fi
          fi

      - name: Setup MSVC
        if: matrix.compiler == 'msvc' && matrix.msvc_version != '2005'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MinGW
        if: matrix.compiler == 'mingw'
        uses: egor-tensin/setup-mingw@v3

      - name: Configure CMake
        shell: bash
        run: |
          cat << 'EOF' > run_configure.sh
          set -e
          CMAKE_EXTRA_ARGS=()

          # Cygwin Compiler Overrides
          if [ "${{ matrix.compiler }}" = "cygwin" ]; then
            # Ensure we use Cygwin's absolute tool paths instead of accidentally picking up MSYS or Windows native tools
            CYG_CC=$(cygpath -u "$(command -v gcc)")
            CYG_CXX=$(cygpath -u "$(command -v g++)")
            CYG_MAKE=$(cygpath -u "$(command -v make)")
            export CC="$CYG_CC"
            export CXX="$CYG_CXX"
            CMAKE_EXTRA_ARGS+=("-DCMAKE_C_COMPILER=$CYG_CC")
            CMAKE_EXTRA_ARGS+=("-DCMAKE_CXX_COMPILER=$CYG_CXX")
            CMAKE_EXTRA_ARGS+=("-DCMAKE_MAKE_PROGRAM=$CYG_MAKE")
          fi

          # Dependency Provider (VCPKG)
          if [ "${{ matrix.deps }}" = "VCPKG" ]; then
            TOOLCHAIN_FILE=""
            if [ -n "$VCPKG_INSTALLATION_ROOT" ]; then
              TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
            elif [ -n "$VCPKG_ROOT" ]; then
              TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
            fi
            
            if [ -n "$TOOLCHAIN_FILE" ]; then
              if [ "${{ matrix.compiler }}" = "cygwin" ] && command -v cygpath >/dev/null 2>&1; then
                TOOLCHAIN_FILE=$(cygpath -u "$TOOLCHAIN_FILE")
              fi
              CMAKE_EXTRA_ARGS+=("-DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN_FILE")
            else
              echo "Warning: VCPKG_INSTALLATION_ROOT is not set, but VCPKG is requested. CMake will rely on system path."
            fi
          fi

          # MSVC 2005 Generator (Currently commented out in matrix, but logic remains for future)
          # if [ "${{ matrix.compiler }}" = "msvc" ] && [ "${{ matrix.msvc_version }}" = "2005" ]; then
          #   CMAKE_EXTRA_ARGS+=("-G" "Visual Studio 8 2005")
          # fi

          # MinGW Generator
          if [ "${{ matrix.compiler }}" = "mingw" ]; then
            CMAKE_EXTRA_ARGS+=("-G" "MinGW Makefiles")
          fi

          # MinGW & Cygwin specific flags for C99 math functions
          if [ "${{ matrix.compiler }}" = "mingw" ] || [ "${{ matrix.compiler }}" = "cygwin" ]; then
            CMAKE_EXTRA_ARGS+=("-DCMAKE_C_FLAGS_INIT=-D_GNU_SOURCE")
            CMAKE_EXTRA_ARGS+=("-DCMAKE_CXX_FLAGS_INIT=-D_GNU_SOURCE")
          fi

          # Clang Compiler Overrides (Linux)
          if [ "${{ matrix.compiler }}" = "clang" ] && [ "${{ runner.os }}" = "Linux" ]; then
            export CC=clang
            export CXX=clang++
          fi

          # Auto Test Flag derived from project name
          if [ "${{ inputs.auto_test_flag }}" = "true" ]; then
            PROJ_NAME="${{ inputs.project_name }}"
            if [ -z "$PROJ_NAME" ]; then
              PROJ_NAME="${GITHUB_REPOSITORY#*/}"
            fi
            # Uppercase and replace hyphens with underscores
            PROJ_NAME_UPPER=$(echo "$PROJ_NAME" | tr 'a-z' 'A-Z' | tr '-' '_')
            CMAKE_EXTRA_ARGS+=("-D${PROJ_NAME_UPPER}_BUILD_TESTING=ON" "-DBUILD_TESTING=ON")
          fi

          # Execute CMake
          cmake -B build -S . \
            "-DCMAKE_BUILD_TYPE=${{ inputs.build_type }}" \
            "-DBUILD_SHARED_LIBS=${{ matrix.shared }}" \
            "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=${{ matrix.lto }}" \
            "-DCDD_CHARSET=${{ matrix.charset }}" \
            "-DCDD_THREADING=${{ matrix.thread }}" \
            "-DCDD_DEPS=${{ matrix.deps }}" \
            "-DCDD_MSVC_RTC=${{ matrix.rtc }}" \
            "-DCMAKE_MSVC_RUNTIME_LIBRARY=${{ matrix.crt }}" \
            "${CMAKE_EXTRA_ARGS[@]}" ${{ inputs.cmake_configure_flags }}
          EOF
          
          chmod +x ./run_configure.sh
          
          if [ "${{ matrix.compiler }}" = "cygwin" ]; then
            C:/cygwin/bin/bash.exe --login -o igncr -c 'cd "$(cygpath -u "$GITHUB_WORKSPACE")"; ./run_configure.sh'
          else
            bash ./run_configure.sh
          fi

      - name: Build
        shell: bash
        run: |
          cat << 'EOF' > run_build.sh
          set -e
          cmake --build build --config "${{ inputs.build_type }}" --parallel 4 ${{ inputs.cmake_build_flags }}
          EOF
          
          chmod +x ./run_build.sh
          
          if [ "${{ matrix.compiler }}" = "cygwin" ]; then
            C:/cygwin/bin/bash.exe --login -o igncr -c 'cd "$(cygpath -u "$GITHUB_WORKSPACE")"; ./run_build.sh'
          else
            bash ./run_build.sh
          fi

      - name: Run Tests
        shell: bash
        working-directory: build
        run: |
          cat << 'EOF' > run_tests.sh
          set -e
          ctest -C "${{ inputs.build_type }}" --output-on-failure
          EOF
          
          chmod +x ./run_tests.sh
          
          if [ "${{ matrix.compiler }}" = "cygwin" ]; then
            C:/cygwin/bin/bash.exe --login -o igncr -c 'cd "$(cygpath -u "$GITHUB_WORKSPACE/build")"; ./run_tests.sh'
          else
            bash ./run_tests.sh
          fi

